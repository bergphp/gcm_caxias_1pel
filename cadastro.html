<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: #f0f0f0;
            border-radius: 50%;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        h2 { margin-bottom: 8px; color: #333; }
        .welcome { color: #666; font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 16px;
        }
        button:hover { background: #5a6fd8; }
        .back-link { color: #667eea; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .error { color: #e74c3c; text-align: center; margin-top: 12px; display: none; }
        .success { color: #27ae60; text-align: center; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="SUA_LOGO_AQUI.png" alt="Logo">
        </div>
        <h2>Criar conta</h2>
        <p class="welcome">Preencha os dados para se cadastrar</p>
        
        <form id="cadastroForm">
            <div class="input-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" minlength="6" required>
            </div>
            <div class="input-group">
                <label for="confirmaSenha">Confirmar senha</label>
                <input type="password" id="confirmaSenha" minlength="6" required>
            </div>
            
            <button type="submit">Cadastrar</button>
            <a href="index.html" class="back-link">Já tenho conta</a>
            
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg">Conta criada com sucesso!</div>
        </form>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmaSenha').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (senha !== confirma) {
                errorMsg.textContent = 'As senhas não coincidem';
                errorMsg.style.display = 'block';
                return;
            }
            
            successMsg.style.display = 'block';
            // Aqui você enviaria os dados pro backend
            setTimeout(() => window.location.href = 'index.html', 2000);
        });
    </script>
</body>
</html>
