<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: #f0f0f0;
            border-radius: 50%;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        h2 { margin-bottom: 8px; color: #333; }
        .welcome { color: #666; font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 16px;
        }
        button:hover { background: #5a6fd8; }
        .back-link { color: #667eea; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .success { color: #27ae60; text-align: center; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="SUA_LOGO_AQUI.png" alt="Logo">
        </div>
        <h2>Esqueceu a senha?</h2>
        <p class="welcome">Digite seu e-mail para receber o link de recuperação</p>
        
        <form id="recuperarForm">
            <div class="input-group">
                <label for="email">E-mail cadastrado</label>
                <input type="email" id="email" required>
            </div>
            
            <button type="submit">Enviar link</button>
            <a href="index.html" class="back-link">Voltar para o login</a>
            
            <div class="success" id="successMsg">Link enviado! Verifique seu e-mail.</div>
        </form>
    </div>

    <script>
        document.getElementById('recuperarForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').style.display = 'block';
            // Aqui você chamaria o backend pra enviar o e-mail
        });
    </script>
</body>
</html>
